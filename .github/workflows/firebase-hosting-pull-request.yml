name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main # Agar aapki branch ka naam master hai to yahan master likh den

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies & Build Web
        run: |
          flutter pub get
          flutter build web --release

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GENERALSTORE_DD7A5 }}
          channelId: live
          projectId: generalstore-dd7a5 # Firebase project ID automatic uth jati hai