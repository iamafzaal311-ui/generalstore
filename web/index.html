<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Vivid Digital Nexus Inventory & POS System">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Vivid Digital Nexus">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>Vivid Digital Nexus - POS</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: #1e3a8a;
      background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Heavy Claymorphism Card ── */
    .card {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 64px;
      border-radius: 48px;
      background: #1e3a8a;
      box-shadow:
        24px 24px 48px rgba(8, 15, 40, 0.6),
        -24px -24px 48px rgba(59, 130, 246, 0.1),
        inset 12px 12px 24px rgba(59, 130, 246, 0.3),
        inset -12px -12px 24px rgba(8, 15, 40, 0.5);
      max-width: 460px;
      width: 92vw;
      text-align: center;
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(50px) scale(0.9);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── Claymorphism Logo Container ── */
    .logo-container {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: #1e3a8a;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow:
        16px 16px 32px rgba(8, 15, 40, 0.6),
        -16px -16px 32px rgba(59, 130, 246, 0.1),
        inset 8px 8px 16px rgba(59, 130, 246, 0.3),
        inset -8px -8px 16px rgba(8, 15, 40, 0.5);
      animation: floatLogo 4s ease-in-out infinite;
    }

    @keyframes floatLogo {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    .logo-container img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      /* Inner image drop shadow to pop from the clay */
      filter: drop-shadow(4px 8px 8px rgba(17, 34, 100, 0.5));
    }

    /* ── Text Styling with Clay/Embossed feel ── */
    .brand {
      font-size: 2rem;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -0.5px;
      text-shadow: 2px 4px 6px rgba(17, 34, 100, 0.4);
    }

    .tagline {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #bfdbfe;
      font-weight: 600;
    }

    /* ── Claymorphism Progress Bar ── */
    .progress-wrap {
      width: 100%;
      margin-top: 40px;
      height: 24px;
      border-radius: 24px;
      background: #1e3a8a;
      box-shadow:
        inset 6px 6px 12px rgba(8, 15, 40, 0.6),
        inset -6px -6px 12px rgba(59, 130, 246, 0.3);
      overflow: hidden;
      padding: 4px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 20px;
      background: #ffffff;
      /* Outset shadow to make the moving bar pop out */
      box-shadow:
        4px 0px 8px rgba(17, 34, 100, 0.3),
        inset 2px 2px 4px rgba(255, 255, 255, 1),
        inset -2px -2px 4px rgba(226, 232, 240, 1);
      transition: width 0.4s ease;
    }

    /* ── Rotating tips ── */
    .tips-wrap {
      margin-top: 24px;
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tip {
      font-size: 0.85rem;
      color: #dbeafe;
      font-weight: 600;
      line-height: 1.5;
      animation: tipFade 0.5s ease;
    }

    @keyframes tipFade {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Hide once Flutter loads */
    #loading-indicator.hidden {
      animation: fadeOut 0.5s ease forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: scale(1.05);
        pointer-events: none;
      }
    }
  </style>
</head>

<body>
  <div id="loading-indicator">
    <div class="card">
      <div class="logo-container">
        <!-- Exact white logo, enlarged and sharp -->
        <img src="vdn_logo.png" alt="VDN Logo">
      </div>

      <div class="brand">Vivid Digital Nexus</div>
      <div class="tagline">Inventory &amp; POS Management System</div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>

      <div class="tips-wrap">
        <div class="tip" id="tip-text">Loading your robust system...</div>
      </div>
    </div>
  </div>

  <script>
    // ── Progress bar simulation ───────────────────────────────
    const bar = document.getElementById('progress-bar');
    let prog = 0;
    const ticks = [
      { target: 20, delay: 200 },
      { target: 45, delay: 600 },
      { target: 70, delay: 1200 },
      { target: 85, delay: 2000 },
      { target: 95, delay: 3500 },
    ];
    ticks.forEach(({ target, delay }) => {
      setTimeout(() => { bar.style.width = target + '%'; }, delay);
    });

    // ── Rotating tips ─────────────────────────────────────────
    const tips = [
      '📦 Setting up your inventory workspace...',
      '🧾 Preparing the high-speed POS system...',
      '📊 Establishing secure connections...',
      '🔄 Synchronizing cloud data...',
      '🏪 Built specifically for premium retail experiences.',
    ];
    let tipIdx = 0;
    const tipEl = document.getElementById('tip-text');
    setInterval(() => {
      tipIdx = (tipIdx + 1) % tips.length;
      tipEl.style.animation = 'none';
      void tipEl.offsetWidth; // reflow
      tipEl.style.animation = '';
      tipEl.textContent = tips[tipIdx];
    }, 2500);

    // ── Hide once Flutter view is ready ───────────────────────
    const observer = new MutationObserver((mutations, obs) => {
      for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
          if (node.tagName && node.tagName.toLowerCase() === 'flutter-view') {
            bar.style.width = '100%';
            setTimeout(() => {
              const loader = document.getElementById('loading-indicator');
              if (loader) {
                loader.classList.add('hidden');
                setTimeout(() => loader.remove(), 500);
              }
            }, 400);
            obs.disconnect();
          }
        }
      }
    });
    observer.observe(document.body, { childList: true });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
